<!DOCTYPE html>
<html>
<head>
    <title>Hackathon Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(270deg, #ff6a00, #ee0979, #00c9ff, #92fe9d);
            background-size: 800% 800%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .header {
            text-align: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #00c9ff, #92fe9d);
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🚀 HACKATHON 2026</h1>
        <p>Code. Create. Conquer.</p>
    </div>

    <div class="container">
        <h2>Register Now</h2>

        <!-- IMPORTANT: This must match Flask route -->
        <form action="/register" method="POST">

            <input type="text" name="name" placeholder="👤 Full Name" required>
            <input type="text" name="college" placeholder="🏫 College" required>
            <input type="text" name="college_id" placeholder="🆔 ID" required>

            <select name="semester" required>
                <option value="">Select Semester</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
            </select>

            <select name="event">
                <option>AI Hackathon</option>
                <option>Web Development</option>
                <option>App Development</option>
                <option>Cybersecurity</option>
            </select>

            <button type="submit">Register</button>
        </form>

    </div>

</body>
</html>
